<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · 사용자 관리</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-area="admin" data-active="users">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head">
      <h2>사용자 관리</h2>
      <p>가입 승인과 수강생 관리를 한 곳에서 합니다. 상단 탭으로 전환하세요.</p>
    </div>

    <div class="seg">
      <button class="seg__btn is-on" data-tab="pending">가입자 관리 <span class="seg__badge" id="pendBadge">0</span></button>
      <button class="seg__btn" data-tab="users">사용자 관리 <span class="seg__badge" id="userBadge">0</span></button>
    </div>

    <!-- ===== 가입자 관리 (승인 대기) ===== -->
    <section id="tab-pending">
      <div class="panel">
        <div class="panel__head" style="flex-wrap:wrap;gap:10px;">
          <span>승인 요청 <span id="pendCount" style="color:var(--muted);font-weight:600;"></span></span>
          <span style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-size:0.82rem;color:var(--muted);">승인 시 기수</span>
            <select id="bulkCohort" style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:0.84rem;font-weight:700;">
              <option value="each">각 행에서 지정</option>
            </select>
            <button class="btn-primary" id="bulkApprove" disabled>선택 일괄 승인</button>
          </span>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" id="pendAll" title="전체 선택"></th>
              <th>성명</th><th>전화번호</th><th>구글 이메일</th><th>신청일</th>
              <th style="width:150px;">수강일</th><th style="width:140px;">기수(자동)</th><th style="width:130px;">처리</th>
            </tr>
          </thead>
          <tbody id="pendBody">
            <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== 사용자 관리 (승인된 수강생) ===== -->
    <section id="tab-users" hidden>
      <div class="stat-row">
        <div class="stat">
          <div class="label">총 수강생 (승인)</div>
          <div class="value"><span id="userCount">0</span> <span style="font-size:0.9rem;font-weight:600;">명</span></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel__head"><span>수강생 리스트</span></div>
        <table>
          <thead>
            <tr>
              <th>성명</th><th>이메일</th><th>전화번호</th>
              <th>기수</th><th>수강일</th><th>상태</th><th>스토어</th><th>제출(확정)</th><th>발주&amp;광고</th><th>관리</th>
            </tr>
          </thead>
          <tbody id="userBody">
            <tr><td colspan="10" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<!-- 수강생 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-card" style="max-width:640px;">
    <div class="modal-card__head">
      <h3 id="detailTitle">수강생 상세</h3>
      <button type="button" class="modal-close" id="detailClose">&times;</button>
    </div>
    <div class="modal-card__body" id="detailBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/auth.js"></script>
<script>
(function () {
  var BUCKET = 'submissions';
  var ITEM_LABELS = { shop: 'Shop 설정', category: '금지 & 카테고리 설정', order: '기본 필수 주문 설정', amazon: '아마존 가입 & 프라임 설정' };
  var ITEM_ORDER = ['shop', 'category', 'order', 'amazon'];

  var els = {
    pendBody: document.getElementById('pendBody'),
    pendCount: document.getElementById('pendCount'),
    pendBadge: document.getElementById('pendBadge'),
    pendAll: document.getElementById('pendAll'),
    bulkCohort: document.getElementById('bulkCohort'),
    bulkApprove: document.getElementById('bulkApprove'),
    userBody: document.getElementById('userBody'),
    userCount: document.getElementById('userCount'),
    userBadge: document.getElementById('userBadge'),
    modal: document.getElementById('detailModal'),
    detailBody: document.getElementById('detailBody'),
    detailTitle: document.getElementById('detailTitle'),
  };

  var all = [], storesByUser = {}, subsByUser = {}, cohorts = [], defaultCohort = 1, cohortByDate = {}, pendingReq = {};

  function ymd(iso) { return iso ? iso.slice(0, 10) : ''; }
  function cohortDateOf(id) {
    var c = cohorts.find(function (x) { return x.id === id; });
    return (c && c.enroll_date) ? c.enroll_date : '';
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function fmtDate(iso) { return iso ? iso.slice(0, 10) : '-'; }
  function statusTag(st) {
    if (st === 'approved') return '<span class="tag tag--ok">승인</span>';
    if (st === 'rejected') return '<span class="tag tag--no">거절</span>';
    return '<span class="tag tag--wait">대기</span>';
  }
  // 어드민 표시용: 기수 이름 · 수강일 (어드민은 둘 다 봄)
  function cohortText(c) { return esc(c.label) + (c.enroll_date ? ' · ' + esc(c.enroll_date) : ''); }
  function cohortDate(id) {
    var c = cohorts.find(function (x) { return x.id === id; });
    return (c && c.enroll_date) ? esc(c.enroll_date) : '<span style="color:var(--muted);">-</span>';
  }
  // 기수 드롭다운 옵션. 현재 값이 목록에 없으면 임시로 포함.
  function cohortOptions(cur) {
    var seen = {}, opts = '';
    cohorts.forEach(function (c) {
      seen[c.id] = true;
      opts += '<option value="' + c.id + '"' + (c.id === cur ? ' selected' : '') + '>' + cohortText(c) + '</option>';
    });
    if (!seen[cur]) {
      var lbl = (cur === 0) ? '미분류' : cur + '기';
      opts = '<option value="' + cur + '" selected>' + lbl + '</option>' + opts;
    }
    return opts;
  }

  /* ---------- 탭 전환 ---------- */
  document.querySelectorAll('.seg__btn').forEach(function (b) {
    b.addEventListener('click', function () {
      document.querySelectorAll('.seg__btn').forEach(function (x) { x.classList.remove('is-on'); });
      this.classList.add('is-on');
      var tab = this.dataset.tab;
      document.getElementById('tab-pending').hidden = tab !== 'pending';
      document.getElementById('tab-users').hidden = tab !== 'users';
    });
  });

  /* ---------- 데이터 로드 ---------- */
  async function load() {
    var pr = await sb.from('profiles').select('*').neq('role', 'admin').order('created_at');
    if (pr.error) {
      els.pendBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:40px;">조회 실패: ' + esc(pr.error.message) + '</td></tr>';
      return;
    }
    all = pr.data || [];

    var co = await sb.from('cohorts').select('*').order('id');
    cohorts = co.data || [];
    defaultCohort = cohorts.length ? cohorts[cohorts.length - 1].id : 1;   // 가장 최근 기수를 기본값
    // 수강일 → 기수 자동 매칭표
    cohortByDate = {};
    cohorts.forEach(function (c) { if (c.enroll_date) cohortByDate[c.enroll_date] = c.id; });

    storesByUser = {}; subsByUser = {};
    var st = await sb.from('stores').select('*');
    (st.data || []).forEach(function (s) { (storesByUser[s.user_id] = storesByUser[s.user_id] || []).push(s); });
    var su = await sb.from('submissions').select('*');
    (su.data || []).forEach(function (r) { (subsByUser[r.user_id] = subsByUser[r.user_id] || []).push(r); });

    // 등급업 신청(대기 중)
    pendingReq = {};
    var lr = await sb.from('level_requests').select('*').eq('status', 'pending');
    (lr.data || []).forEach(function (r) { pendingReq[r.user_id] = r; });

    fillBulkCohort();
    renderPending();
    renderUsers();
  }

  function fillBulkCohort() {
    var opts = '<option value="each">각 행에서 지정</option>';
    cohorts.forEach(function (c) { opts += '<option value="' + c.id + '">' + cohortText(c) + ' (으)로</option>'; });
    els.bulkCohort.innerHTML = opts;
  }

  /* ---------- 가입자 관리 (대기) ---------- */
  function renderPending() {
    var pending = all.filter(function (u) { return u.status === 'pending'; });
    els.pendCount.textContent = pending.length ? '(' + pending.length + '명)' : '';
    els.pendBadge.textContent = pending.length;
    els.pendAll.checked = false;
    updateBulkBtn();

    if (!pending.length) {
      els.pendBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px;">승인 대기 중인 가입자가 없습니다.</td></tr>';
      return;
    }
    els.pendBody.innerHTML = pending.map(function (u) {
      // 기본 수강일 = 개인 수강일 or 신청일. 그 날짜의 기수를 자동 매칭
      var d = u.enroll_date || ymd(u.created_at);
      var matched = cohortByDate[d] || u.cohort || defaultCohort;
      return '<tr data-id="' + u.id + '">' +
        '<td><input type="checkbox" class="pend-check" data-id="' + u.id + '"></td>' +
        '<td><b>' + esc(u.name) + '</b></td>' +
        '<td>' + esc(u.phone) + '</td>' +
        '<td>' + esc(u.email) + '</td>' +
        '<td>' + fmtDate(u.created_at) + '</td>' +
        '<td><input type="date" class="pend-date" value="' + esc(d) + '" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:0.82rem;"></td>' +
        '<td><select class="pend-cohort" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:0.82rem;">' +
          cohortOptions(matched) + '</select></td>' +
        '<td>' +
          '<button class="btn-sm is-primary" data-approve="' + u.id + '">승인</button> ' +
          '<button class="btn-sm" data-reject="' + u.id + '" style="color:var(--danger);">거절</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function updateBulkBtn() {
    var n = els.pendBody.querySelectorAll('.pend-check:checked').length;
    els.bulkApprove.textContent = n ? '선택 일괄 승인 (' + n + ')' : '선택 일괄 승인';
    els.bulkApprove.disabled = n === 0;
  }

  els.pendAll.addEventListener('change', function () {
    els.pendBody.querySelectorAll('.pend-check').forEach(function (c) { c.checked = els.pendAll.checked; });
    updateBulkBtn();
  });

  // 승인: 기수 + 수강일 저장
  async function approveOne(id, cohortVal, dateVal) {
    var res = await sb.from('profiles')
      .update({ status: 'approved', cohort: cohortVal, enroll_date: dateVal || null })
      .eq('id', id).select();
    if (res.error) { alert('승인 실패: ' + res.error.message); return false; }
    if (!res.data || !res.data.length) { alert('승인 권한이 없어 반영되지 않았습니다. (어드민 정책 SQL 확인)'); return false; }
    return true;
  }

  // 수강일 ↔ 기수 자동 연동 + 체크 상태
  els.pendBody.addEventListener('change', function (e) {
    if (e.target.classList.contains('pend-check')) { updateBulkBtn(); return; }
    var tr = e.target.closest('tr');
    if (!tr) return;
    if (e.target.classList.contains('pend-date')) {
      // 날짜를 바꾸면 그 날짜의 기수를 자동 선택
      var cid = cohortByDate[e.target.value];
      if (cid) tr.querySelector('.pend-cohort').value = String(cid);
    } else if (e.target.classList.contains('pend-cohort')) {
      // 기수를 바꾸면 그 기수의 수강일로 날짜를 맞춤
      var d = cohortDateOf(parseInt(e.target.value, 10));
      if (d) tr.querySelector('.pend-date').value = d;
    }
  });

  els.pendBody.addEventListener('click', async function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var approve = btn.getAttribute('data-approve');
    var reject = btn.getAttribute('data-reject');

    if (approve) {
      var tr = btn.closest('tr');
      var cohortVal = parseInt(tr.querySelector('.pend-cohort').value, 10) || defaultCohort;
      var dateVal = tr.querySelector('.pend-date').value || null;
      btn.disabled = true;
      if (await approveOne(approve, cohortVal, dateVal)) await load();
      else btn.disabled = false;
    } else if (reject) {
      if (!confirm('이 가입 요청을 거절하시겠습니까?')) return;
      var r = await sb.from('profiles').update({ status: 'rejected' }).eq('id', reject).select();
      if (r.error) { alert('거절 실패: ' + r.error.message); return; }
      if (!r.data || !r.data.length) { alert('권한이 없어 반영되지 않았습니다.'); return; }
      await load();
    }
  });

  els.bulkApprove.addEventListener('click', async function () {
    var checks = Array.prototype.slice.call(els.pendBody.querySelectorAll('.pend-check:checked'));
    if (!checks.length) return;
    var mode = els.bulkCohort.value;   // 'each' 또는 기수 id
    var label = mode === 'each' ? '각 행에서 지정한 기수' :
      (els.bulkCohort.options[els.bulkCohort.selectedIndex].text);
    if (!confirm(checks.length + '명을 승인합니다.\n기수: ' + label)) return;

    els.bulkApprove.disabled = true;
    els.bulkApprove.textContent = '승인 중...';
    for (var i = 0; i < checks.length; i++) {
      var id = checks[i].dataset.id;
      var tr = checks[i].closest('tr');
      var cohortVal, dateVal;
      if (mode === 'each') {
        cohortVal = parseInt(tr.querySelector('.pend-cohort').value, 10) || defaultCohort;
        dateVal = tr.querySelector('.pend-date').value || null;
      } else {
        cohortVal = Number(mode);
        dateVal = cohortDateOf(cohortVal) || null;   // 특정 기수로 몰면 그 기수의 수강일 부여
      }
      var ok = await approveOne(id, cohortVal, dateVal);
      if (!ok) break;
    }
    await load();
  });

  /* ---------- 사용자 관리 (승인됨) ---------- */
  function renderUsers() {
    var list = all.filter(function (u) { return u.status !== 'pending'; });
    var approved = all.filter(function (u) { return u.status === 'approved'; });
    els.userCount.textContent = approved.length;
    els.userBadge.textContent = approved.length;

    if (!list.length) {
      els.userBody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:40px;">승인된 수강생이 없습니다.</td></tr>';
      return;
    }
    els.userBody.innerHTML = list.map(function (u) {
      var storeN = (storesByUser[u.id] || []).length;
      var subs = subsByUser[u.id] || [];
      var confirmed = subs.filter(function (r) { return r.status === 'confirmed'; }).length;
      var opts = cohortOptions(u.cohort || 1);
      var lvOpen = (u.level || 0) >= 1;
      var req = pendingReq[u.id];   // 등급업 신청(대기)
      var lvCell = lvOpen
        ? '<span class="tag tag--ok">열림</span> <button class="btn-link" data-level="' + u.id + '" data-to="0">닫기</button>'
        : '<span class="tag tag--wait">잠금</span> <button class="btn-link" data-level="' + u.id + '" data-to="1">열기</button>';
      if (req) {
        lvCell += '<div style="margin-top:5px;">🚀 <span class="tag tag--wait">등급업 신청</span> ' +
          '<button class="btn-link" data-approve="' + u.id + '">승인</button> ' +
          '<button class="btn-link danger" data-reject="' + u.id + '">거절</button></div>';
      }
      return '<tr>' +
        '<td><b>' + esc(u.name) + '</b></td>' +
        '<td>' + esc(u.email) + '</td>' +
        '<td>' + esc(u.phone) + '</td>' +
        '<td><select class="cohort-pick" data-id="' + u.id + '" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:0.82rem;">' + opts + '</select></td>' +
        '<td><input type="date" class="user-date" data-id="' + u.id + '" value="' + esc(u.enroll_date || '') + '" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:0.82rem;"></td>' +
        '<td>' + statusTag(u.status) + '</td>' +
        '<td>' + storeN + '개</td>' +
        '<td>' + confirmed + ' / 4</td>' +
        '<td>' + lvCell + '</td>' +
        '<td>' +
          '<button class="btn-sm" data-detail="' + u.id + '">상세</button> ' +
          '<button class="btn-sm" data-reset="' + esc(u.email) + '">비번 재설정</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function openDetail(u) {
    els.detailTitle.textContent = (u.name || '수강생') + ' 상세';
    var stores = storesByUser[u.id] || [];
    var subs = subsByUser[u.id] || [];

    var html = '';
    html += '<h4 style="margin:0 0 8px;">스토어 (' + stores.length + ')</h4>';
    if (!stores.length) {
      html += '<p style="color:var(--muted);font-size:0.85rem;">등록된 스토어가 없습니다.</p>';
    } else {
      html += '<ul style="margin:0 0 18px;padding-left:18px;font-size:0.86rem;line-height:1.8;">';
      stores.forEach(function (s) {
        var url = s.url ? ' · <a href="' + esc(s.url) + '" target="_blank" rel="noopener">' + esc(s.url) + '</a>' : '';
        var code = s.partner_code ? ' · 코드 ' + esc(s.partner_code) : '';
        html += '<li><b>' + esc(s.name) + '</b> (' + (esc(s.topic) || '주제없음') + ')' + url + code + '</li>';
      });
      html += '</ul>';
    }

    html += '<h4 style="margin:0 0 8px;">자료 제출</h4>';
    html += '<table style="width:100%;border-collapse:collapse;font-size:0.84rem;table-layout:fixed;">';
    ITEM_ORDER.forEach(function (item) {
      var row = subs.filter(function (r) { return r.item === item; })[0];
      var status = row ? (row.status === 'confirmed' ? '<span class="tag tag--ok">확정</span>' : '<span class="tag tag--wait">대기</span>') : '<span style="color:#aab;">미제출</span>';
      var viewBtn = row ? '<button class="btn-sm" data-path="' + esc(row.file_path) + '">열기</button>' : '';
      html += '<tr style="border-bottom:1px solid #f0f2f6;">' +
        '<td style="padding:8px;width:160px;white-space:nowrap;">' + ITEM_LABELS[item] + '</td>' +
        '<td style="padding:8px;word-break:break-all;">' + (row ? '📎 ' + esc(row.file_name) : '<span style="color:#aab;">-</span>') + '</td>' +
        '<td style="padding:8px;width:70px;text-align:center;">' + status + '</td>' +
        '<td style="padding:8px;width:64px;text-align:right;">' + viewBtn + '</td>' +
      '</tr>';
    });
    html += '</table>';
    els.detailBody.innerHTML = html;
    els.modal.classList.add('is-open');
  }
  function closeDetail() { els.modal.classList.remove('is-open'); }
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  els.modal.addEventListener('click', function (e) { if (e.target === els.modal) closeDetail(); });

  // 기수 변경 / 수강일 변경 (사용자 탭 — 각각 따로 수정)
  els.userBody.addEventListener('change', async function (e) {
    var sel = e.target.closest('.cohort-pick');
    if (sel) {
      var id = sel.dataset.id;
      var val = parseInt(sel.value, 10) || 1;
      var res = await sb.from('profiles').update({ cohort: val }).eq('id', id).select();
      if (res.error || !res.data || !res.data.length) {
        alert('기수 변경 실패' + (res.error ? ': ' + res.error.message : '')); return;
      }
      var u = all.filter(function (x) { return x.id === id; })[0];
      if (u) u.cohort = val;
      return;
    }
    var dinp = e.target.closest('.user-date');
    if (dinp) {
      var id2 = dinp.dataset.id;
      var d = dinp.value || null;
      var r2 = await sb.from('profiles').update({ enroll_date: d }).eq('id', id2).select();
      if (r2.error || !r2.data || !r2.data.length) {
        alert('수강일 변경 실패' + (r2.error ? ': ' + r2.error.message : '')); return;
      }
      var u2 = all.filter(function (x) { return x.id === id2; })[0];
      if (u2) u2.enroll_date = d;
      return;
    }
  });

  els.userBody.addEventListener('click', async function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var detail = btn.getAttribute('data-detail');
    var reset = btn.getAttribute('data-reset');
    var levelId = btn.getAttribute('data-level');
    var approveId = btn.getAttribute('data-approve');
    var rejectId = btn.getAttribute('data-reject');

    // 등급업 신청 승인 → 발주&광고 열기 + 신청 처리
    if (approveId) {
      var reqA = pendingReq[approveId];
      var uA = all.filter(function (x) { return x.id === approveId; })[0];
      if (!confirm('"' + (uA ? uA.name : '수강생') + '"님의 등급업을 승인할까요? (발주 & 광고 훈련이 열립니다)')) return;
      var up = await sb.from('profiles').update({ level: (reqA ? reqA.to_level : 1) || 1 }).eq('id', approveId).select();
      if (up.error || !up.data || !up.data.length) { alert('승인 실패' + (up.error ? ': ' + up.error.message : '')); return; }
      if (reqA) await sb.from('level_requests').update({ status: 'approved', decided_at: new Date().toISOString() }).eq('id', reqA.id);
      await load();
      return;
    }
    if (rejectId) {
      var reqR = pendingReq[rejectId];
      if (!reqR) { await load(); return; }
      var note = prompt('반려 사유를 입력하세요 (수강생에게 표시):', '');
      if (note == null) return;
      var rr = await sb.from('level_requests').update({ status: 'rejected', note: note.trim() || null, decided_at: new Date().toISOString() }).eq('id', reqR.id);
      if (rr.error) { alert('거절 실패: ' + rr.error.message); return; }
      await load();
      return;
    }
    if (levelId) {
      var to = parseInt(btn.getAttribute('data-to'), 10) || 0;
      var u0 = all.filter(function (x) { return x.id === levelId; })[0];
      var msg = to >= 1
        ? '"' + (u0 ? u0.name : '수강생') + '"님에게 발주 & 광고 훈련을 열어줄까요?'
        : '"' + (u0 ? u0.name : '수강생') + '"님의 발주 & 광고 훈련을 다시 잠글까요?';
      if (!confirm(msg)) return;
      var r = await sb.from('profiles').update({ level: to }).eq('id', levelId).select();
      if (r.error || !r.data || !r.data.length) { alert('변경 실패' + (r.error ? ': ' + r.error.message : '')); return; }
      if (u0) u0.level = to;
      await load();
      return;
    }
    if (detail) {
      var u = all.filter(function (x) { return x.id === detail; })[0];
      if (u) openDetail(u);
    } else if (reset) {
      if (!confirm(reset + ' 로 비밀번호 재설정 메일을 보낼까요?')) return;
      var res = await sb.auth.resetPasswordForEmail(reset);
      if (res.error) { alert('발송 실패: ' + res.error.message); return; }
      alert('재설정 메일을 보냈습니다.');
    }
  });

  els.detailBody.addEventListener('click', async function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var path = btn.getAttribute('data-path');
    if (!path) return;
    var res = await sb.storage.from(BUCKET).createSignedUrl(path, 60);
    if (res.error) { alert('파일 열기 실패: ' + res.error.message); return; }
    window.open(res.data.signedUrl, '_blank');
  });

  (async function init() {
    var admin = await Auth.requireAdmin();
    if (!admin) return;
    await load();
  })();
})();
</script>
</body>
</html>
