<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · 과제 검수</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-area="admin" data-active="chreview">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
      <div>
        <h2>과제 검수</h2>
        <p>수강생이 제출한 과제를 확인하고 통과 · 미통과를 판정합니다.</p>
      </div>
      <select id="chFilter" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.88rem;flex-shrink:0;">
        <option value="">전체 과제</option>
      </select>
    </div>

    <div class="stat-row">
      <div class="stat is-highlight">
        <div class="label">검수 대기</div>
        <div class="value"><span id="sWait">0</span> <span style="font-size:0.9rem;font-weight:600;">건</span></div>
      </div>
      <div class="stat">
        <div class="label">통과</div>
        <div class="value"><span id="sPass">0</span> <span style="font-size:0.9rem;font-weight:600;">건</span></div>
      </div>
      <div class="stat">
        <div class="label">미통과</div>
        <div class="value"><span id="sFail">0</span> <span style="font-size:0.9rem;font-weight:600;">건</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel__head"><span>제출 목록</span></div>
      <table>
        <thead>
          <tr><th>수강생</th><th>과제</th><th>제출일</th><th>결과</th><th>점수</th><th>검수</th></tr>
        </thead>
        <tbody id="revBody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin-challenge-review.js"></script>
</body>
</html>
