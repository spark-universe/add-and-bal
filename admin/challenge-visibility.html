<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · 챌린지 공개 관리</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-area="admin" data-active="cohorts">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
      <div>
        <h2>챌린지 공개 관리</h2>
        <p>기수별로 과제를 <b>어디까지 공개</b>할지, 그리고 <b>예약 공개</b>(정한 시각에 자동 노출)를 설정합니다.
          숨김·예약된 과제는 그전까지 수강생 화면에서 보이지 않습니다.</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <span style="font-size:0.85rem;color:var(--muted);">기수</span>
        <select id="cohortSel" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-weight:700;">
          <option value="1">1기</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="panel__head">
        <span>과제 목차 <span id="cvCount" style="color:var(--muted);font-weight:600;"></span></span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span class="form-saved" id="saved" hidden>저장되었습니다</span>
          <button class="btn-primary" id="saveAll" disabled>모두 저장</button>
        </span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:56px;">순서</th>
            <th>과제</th>
            <th style="width:110px;">마감일</th>
            <th style="width:120px;">현재</th>
            <th style="width:130px;">상태</th>
            <th style="width:200px;">예약 공개일시</th>
            <th style="width:80px;"></th>
          </tr>
        </thead>
        <tbody id="cvBody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/util.js"></script><script src="../js/layout.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin-challenge-visibility.js"></script>
</body>
</html>
