<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 · 기수 관리</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-area="admin" data-active="cohorts">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head">
      <h2>기수 관리</h2>
      <p><b>기수 이름</b>은 어드민 전용 그룹 이름(예: "1기")이고, <b>수강일</b>은 수강생 화면에 보이는 정보입니다.
        수강생은 <b>수강일만</b> 보고 기수는 모릅니다. 다른 기수가 있다는 사실도 알 수 없습니다.</p>
    </div>

    <div class="panel">
      <div class="panel__head"><span>새 기수 추가</span></div>
      <div style="padding:18px 24px;">
        <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
          <div class="field" style="min-width:200px;margin:0;">
            <label>기수 이름 <span style="color:var(--muted);font-weight:400;">(어드민 전용)</span></label>
            <input type="text" id="newLabel" placeholder="예: 1기">
          </div>
          <div class="field" style="min-width:180px;margin:0;">
            <label>수강일 <span style="color:var(--muted);font-weight:400;">(수강생 표시)</span></label>
            <input type="date" id="newEnroll">
          </div>
          <button class="btn-primary" id="addBtn">＋ 기수 추가</button>
          <span class="form-saved" id="saved" hidden>저장되었습니다</span>
        </div>
        <div class="field-hint" style="margin-top:8px;">기수 번호는 자동으로 다음 번호가 매겨집니다.</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel__head">
        <span>기수 목록 <span id="coCount" style="color:var(--muted);font-weight:600;"></span></span>
      </div>
      <table>
        <thead>
          <tr><th style="width:64px;">번호</th><th>기수 이름</th><th>수강일</th><th style="width:90px;">수강생</th><th style="width:90px;">노출</th><th style="width:250px;">관리</th></tr>
        </thead>
        <tbody id="coBody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin-cohorts.js"></script>
</body>
</html>
