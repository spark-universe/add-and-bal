<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 설정하기</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-area="user" data-lock="1" data-active="ad">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">

    <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
      <div>
        <h2>Advertising</h2>
        <p>광고 캠페인을 만들고 성과(ROAS · CAC)를 관리하는 연습입니다. 여기서 쓴 <b>광고비는 발주 연습 정산</b>에 반영됩니다. ·
          <a href="order-result.html" style="color:var(--primary);">정산 결과 보기</a>
        </p>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn-sm" id="manageBtn">Manage channels</button>
        <button class="btn-sm" id="moreBtn">More actions ▾</button>
        <button class="btn-sm is-dark" id="createBtn">Create campaign</button>
      </div>
    </div>

    <!-- 상단 지표 (7일) -->
    <div class="ord-metrics" id="advMetrics">
      <div class="ord-metrics__today">📅 7 days</div>
      <div class="ord-metric">
        <div class="l">Customers acquired</div>
        <div class="v" id="mCust">0</div>
      </div>
      <div class="ord-metric">
        <div class="l">Average order value</div>
        <div class="v" id="mAov">$0</div>
      </div>
      <div class="ord-metric">
        <div class="l">Sales</div>
        <div class="v" id="mSales">$0</div>
      </div>
      <div class="ord-metric">
        <div class="l">Spend</div>
        <div class="v" id="mSpend">$0</div>
      </div>
      <div class="ord-metric">
        <div class="l">Average CAC</div>
        <div class="v" id="mCac">$0</div>
      </div>
      <div class="ord-metric">
        <div class="l">ROAS</div>
        <div class="v" id="mRoas">0</div>
      </div>
    </div>

    <!-- 캠페인 목록 -->
    <div class="ord-panel">
      <div class="ord-toolbar">
        <span class="adv-tab is-on" data-tab="all">All</span>
        <span class="adv-tab" data-tab="active">Active</span>
        <span class="adv-tab" data-tab="completed">Completed</span>
        <span style="flex:1;"></span>
        <span style="font-size:0.78rem;color:var(--muted);" id="advUpdated"></span>
      </div>
      <div class="ord-head2">
        <span>Campaigns</span>
        <span style="font-weight:600;color:var(--muted);font-size:0.82rem;" id="advCount"></span>
      </div>
      <div class="ord-scroll">
        <table class="ord-table">
          <thead>
            <tr>
              <th>Name</th><th>Alerts</th><th>Status</th><th>Segments</th>
              <th class="r">Sales</th><th class="r">Avg CAC</th><th class="r">ROAS</th>
              <th class="r">Customers</th><th class="r">AOV</th><th class="r">Spend</th>
              <th>Countries</th><th>Start</th><th>End</th><th></th>
            </tr>
          </thead>
          <tbody id="advBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/ad-settings.js"></script>
</body>
</html>
