<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>챌린지 · 메인</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-area="challenge" data-active="home">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head">
      <h2>안녕하세요, <span id="chName">수강생</span>님 🏆</h2>
      <p>챌린지 과제를 확인하고 기한 안에 제출하세요.</p>
    </div>

    <div class="stat-row">
      <a class="stat" href="challenge-all.html" style="text-decoration:none;color:inherit;">
        <div class="label">전체 과제</div>
        <div class="value"><span id="cTotal">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </a>
      <a class="stat" href="challenge-mine.html" style="text-decoration:none;color:inherit;">
        <div class="label">제출 완료</div>
        <div class="value"><span id="cDone">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </a>
      <div class="stat is-highlight">
        <div class="label">마감 임박</div>
        <div class="value"><span id="cSoon">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </div>
      <div class="stat">
        <div class="label">획득 점수</div>
        <div class="value"><span id="cScore">-</span> <span style="font-size:0.9rem;font-weight:600;">점</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel__head">
        <span>마감이 가까운 과제</span>
        <a href="challenge-all.html" style="font-size:0.85rem;color:var(--primary);">전체 보기</a>
      </div>
      <table>
        <thead>
          <tr><th>과제</th><th>분류</th><th>마감일</th><th>상태</th></tr>
        </thead>
        <tbody id="chBody">
          <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/challenge.js"></script>
<script>Challenge.home();</script>
</body>
</html>
