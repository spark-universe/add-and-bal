<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발주 연습 세팅</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-area="user" data-active="setup">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head">
      <h2>발주 연습 세팅</h2>
      <p>연습에 사용할 조건을 설정하세요. 설정값에 따라 임시 주문이 생성됩니다.</p>
    </div>

    <form class="setup-form" onsubmit="return false;">
      <div class="form-row">
        <label for="topic">주제 선택</label>
        <select id="topic">
          <option value="">선택하세요</option>
          <option>주방용품</option>
          <option>반려동물</option>
          <option>홈 인테리어</option>
          <option>패션 잡화</option>
        </select>
        <div class="hint">제한된 주제로 임시 주문이 들어옵니다. 주제에 맞춰 진행하세요.</div>
      </div>

      <div class="form-row">
        <label for="margin">설정 마진</label>
        <span class="input-unit" data-unit="%">
          <input id="margin" type="number" min="0" max="100" step="1" inputmode="numeric" placeholder="예: 20">
        </span>
        <div class="hint">숫자만 입력하면 단위(%)는 자동으로 적용됩니다. 발주 완료 후 결과에서 총 수익 계산에 사용됩니다.</div>
      </div>

      <div class="form-row">
        <label for="count">판매된 제품 수</label>
        <input id="count" type="number" min="1" placeholder="예: 30">
        <div class="hint">총 몇 개의 주문을 받을지 설정합니다.</div>
      </div>

      <div class="form-row">
        <label for="level">난이도</label>
        <select id="level">
          <option value="">선택하세요</option>
          <option>하</option>
          <option>중</option>
          <option>상</option>
        </select>
        <div class="hint">
          난이도가 높을수록 사기 주문 · 역마진 · 정보 누락 등 다양한 케이스의 출몰 빈도가 증가합니다.
        </div>
      </div>

      <button class="btn-primary" type="submit">세팅 저장하고 발주 연습 시작</button>
    </form>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script>Auth.require();</script>
</body>
</html>
