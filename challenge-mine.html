<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>챌린지 · 내 과제 관리</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-area="challenge" data-active="mine">
<div class="layout">
  <div id="sidebar"></div>
  <main class="content">
    <div class="page-head">
      <h2>내 과제 관리</h2>
      <p>제출한 과제와 검수 결과를 확인합니다.</p>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="label">제출 완료</div>
        <div class="value"><span id="mDone">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </div>
      <div class="stat">
        <div class="label">검수 통과</div>
        <div class="value"><span id="mPass">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </div>
      <div class="stat">
        <div class="label">검수 대기</div>
        <div class="value"><span id="mWait">-</span> <span style="font-size:0.9rem;font-weight:600;">개</span></div>
      </div>
      <div class="stat is-highlight">
        <div class="label">획득 점수</div>
        <div class="value"><span id="mScore">-</span> <span style="font-size:0.9rem;font-weight:600;">점</span></div>
      </div>
    </div>

    <div class="ord-panel">
      <div class="ord-toolbar">
        <span class="adv-tab is-on" data-filter="all">전체</span>
        <span class="adv-tab" data-filter="todo">미제출</span>
        <span class="adv-tab" data-filter="done">제출완료</span>
        <span class="adv-tab" data-filter="pass">통과</span>
        <span style="flex:1;"></span>
        <span style="font-size:0.82rem;color:var(--muted);" id="mineCount"></span>
      </div>
      <div class="ord-scroll">
        <table class="ord-table">
          <thead>
            <tr><th>숙제</th><th>마감일</th><th>제출일</th><th>검수 결과</th><th>점수</th><th></th></tr>
          </thead>
          <tbody id="mineBody">
            <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/util.js"></script><script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/challenge.js"></script>
<script>Challenge.mine();</script>
</body>
</html>
